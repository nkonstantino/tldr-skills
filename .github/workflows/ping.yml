name: Ping Webhook

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping webhook directly
        run: |
          curl -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"Nick Konstantino\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\",\"source\":\"github-actions\"}"

      - name: Trigger scheduler (fires tasks from store)
        run: |
          curl -s "https://tldr-skills.vercel.app/api/cron/scheduler"
